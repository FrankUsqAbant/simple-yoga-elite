[build]
  # El núcleo del proyecto ahora reside aquí
  base = "protocol-aurora"
  
  # Directorio donde se genera la versión final
  publish = "dist"
  
  # Comando de construcción del Santuario
  command = "npm run build"

[build.environment]
  NODE_VERSION = "20"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
